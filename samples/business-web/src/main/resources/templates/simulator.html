<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Order Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .back-link:hover {
            background: #f0f0f0;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        
        .status-badge.draft {
            background: #FF9800;
        }
        
        .status-badge.info {
            background: #2196F3;
        }
        
        .status-badge.success {
            background: #4CAF50;
        }
        
        .po-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .po-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .po-info-label {
            color: #666;
            font-weight: bold;
        }
        
        .po-info-value {
            color: #333;
        }
        
        .items-list {
            background: #f9f9f9;
            border-radius: 5px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: bold;
            color: #333;
        }
        
        .item-detail {
            font-size: 0.85em;
            color: #666;
        }
        
        .item-total {
            font-weight: bold;
            color: #667eea;
            min-width: 100px;
            text-align: right;
        }
        
        .remove-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8em;
            margin-left: 10px;
        }
        
        .remove-btn:hover {
            background: #d32f2f;
        }
        
        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .total-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .total-amount {
            font-size: 2em;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .approval-warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            color: #856404;
        }
        
        .approver-input {
            display: none;
        }
        
        .approver-input.show {
            display: block;
        }
        
        .empty-message {
            text-align: center;
            padding: 30px;
            color: #999;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Kembali ke Home</a>
        
        <header>
            <h1>Purchase Order Simulator</h1>
            <p>Simulasi Rich Domain Model dan Business Process</p>
        </header>
        
        <div class="main-content">
            <!-- Panel Kiri: Form Input -->
            <div class="card">
                <h2>📝 Buat & Kelola PO</h2>
                
                <div class="form-group">
                    <label for="vendor">Pilih Vendor:</label>
                    <select id="vendor">
                        <option value="">-- Pilih Vendor --</option>
                        <option value="PT Maju Terus">PT Maju Terus</option>
                        <option value="CV Sukses Bersama">CV Sukses Bersama</option>
                        <option value="UD Perkembangan">UD Perkembangan</option>
                        <option value="PT Teknologi Maju">PT Teknologi Maju</option>
                        <option value="Supplier Premium">Supplier Premium</option>
                    </select>
                </div>
                
                <button onclick="buatPO()">Buat PO Baru</button>
                
                <hr style="margin: 20px 0;">
                
                <div id="poInfo" style="display: none;">
                    <div class="po-info">
                        <div class="po-info-row">
                            <span class="po-info-label">Nomor PO:</span>
                            <span class="po-info-value" id="nomorPO">-</span>
                        </div>
                        <div class="po-info-row">
                            <span class="po-info-label">Vendor:</span>
                            <span class="po-info-value" id="vendorName">-</span>
                        </div>
                        <div class="po-info-row">
                            <span class="po-info-label">Status:</span>
                            <span id="statusBadge"></span>
                        </div>
                    </div>
                    
                    <h3 style="color: #667eea; margin-top: 20px; margin-bottom: 10px;">Tambah Item</h3>
                    
                    <div class="form-group">
                        <label for="namaBarang">Nama Barang:</label>
                        <select id="namaBarang">
                            <option value="">-- Pilih Barang --</option>
                            <option>Kertas A4</option>
                            <option>Pulpen Ballpoint</option>
                            <option>Tinta Printer</option>
                            <option>Laptop</option>
                            <option>Monitor</option>
                            <option>Keyboard</option>
                            <option>Mouse</option>
                            <option>Printer</option>
                            <option>Scanner</option>
                            <option>Headphone</option>
                        </select>
                    </div>
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="jumlah">Jumlah:</label>
                            <input type="number" id="jumlah" min="1" value="1">
                        </div>
                        <div class="form-group">
                            <label for="harga">Harga Satuan:</label>
                            <input type="number" id="harga" min="0" step="1000" placeholder="0">
                        </div>
                    </div>
                    
                    <button id="btnTambahItem" onclick="tambahItem()">Tambah Item</button>
                    <button id="btnSubmit" onclick="submitPO()" style="display:none;">Submit PO</button>
                    <button id="btnApprove" onclick="tampilApprover()" style="display:none;">Approve PO</button>
                </div>
            </div>
            
            <!-- Panel Kanan: Review PO -->
            <div class="card">
                <h2>📊 Review PO</h2>
                
                <div id="poEmpty" class="empty-message">
                    <p>Buat PO baru untuk memulai</p>
                </div>
                
                <div id="poDetail" style="display: none;">
                    <div id="approvalWarning" style="display: none;" class="approval-warning">
                        ⚠️ Total PO melebihi batas (Rp 50 juta) - Perlu approval manager
                    </div>
                    
                    <div class="items-list" id="itemsList">
                        <div class="empty-message">Belum ada item</div>
                    </div>
                    
                    <div class="summary">
                        <div class="total-label">Total PO:</div>
                        <div class="total-amount" id="totalAmount">Rp 0</div>
                    </div>
                    
                    <div id="approverInputDiv" class="approver-input">
                        <div class="form-group">
                            <label for="approverName">Nama Approver:</label>
                            <input type="text" id="approverName" placeholder="Nama manager/approver">
                        </div>
                        <button onclick="approvePO()">Setujui PO</button>
                        <button onclick="batalkanApprover()" style="background: #999;">Batal</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentPO = null;
        
        function buatPO() {
            const vendor = document.getElementById('vendor').value;
            if (!vendor) {
                alert('Pilih vendor terlebih dahulu!');
                return;
            }
            
            fetch('/api/po/buat', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'vendor=' + encodeURIComponent(vendor)
            })
            .then(r => r.json())
            .then(data => {
                currentPO = data;
                tampilkanPO();
            })
            .catch(e => alert('Error: ' + e));
        }
        
        function tampilkanPO() {
            document.getElementById('poEmpty').style.display = 'none';
            document.getElementById('poDetail').style.display = 'block';
            document.getElementById('poInfo').style.display = 'block';
            
            document.getElementById('nomorPO').textContent = currentPO.nomorPO;
            document.getElementById('vendorName').textContent = currentPO.vendor;
            
            const badge = document.getElementById('statusBadge');
            badge.className = 'status-badge ' + currentPO.statusBadge;
            badge.textContent = currentPO.statusLabel;
            
            // Tombol submit hanya untuk draft
            document.getElementById('btnTambahItem').style.display = 
                currentPO.status === 'DRAFT' ? 'block' : 'none';
            document.getElementById('btnSubmit').style.display = 
                currentPO.status === 'DRAFT' && currentPO.items.length > 0 ? 'block' : 'none';
            document.getElementById('btnApprove').style.display = 
                currentPO.status === 'MENUNGGU_APPROVAL' ? 'block' : 'none';
            
            updateItemsList();
        }
        
        function tambahItem() {
            const namaBarang = document.getElementById('namaBarang').value;
            const jumlah = parseInt(document.getElementById('jumlah').value);
            const harga = parseFloat(document.getElementById('harga').value);
            
            if (!namaBarang || !jumlah || !harga) {
                alert('Isi semua field!');
                return;
            }
            
            fetch(`/api/po/${currentPO.nomorPO}/item`, {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `namaBarang=${encodeURIComponent(namaBarang)}&jumlah=${jumlah}&harga=${harga}`
            })
            .then(r => r.json())
            .then(data => {
                currentPO = data;
                document.getElementById('namaBarang').value = '';
                document.getElementById('jumlah').value = '1';
                document.getElementById('harga').value = '';
                tampilkanPO();
            })
            .catch(e => alert('Error: ' + e));
        }
        
        function updateItemsList() {
            const list = document.getElementById('itemsList');
            const items = currentPO.items;
            
            if (items.length === 0) {
                list.innerHTML = '<div class="empty-message">Belum ada item</div>';
                document.getElementById('totalAmount').textContent = 'Rp 0';
                return;
            }
            
            list.innerHTML = items.map((item, idx) => `
                <div class="item-row">
                    <div class="item-info">
                        <div class="item-name">${item.namaBarang}</div>
                        <div class="item-detail">${item.jumlah} × Rp ${item.hargaSatuan.toLocaleString('id-ID')}</div>
                    </div>
                    <div class="item-total">Rp ${item.subtotal.toLocaleString('id-ID')}</div>
                    ${currentPO.status === 'DRAFT' ? `<button class="remove-btn" onclick="hapusItem(${idx})">Hapus</button>` : ''}
                </div>
            `).join('');
            
            document.getElementById('totalAmount').textContent = 
                'Rp ' + currentPO.total.toLocaleString('id-ID');
            
            document.getElementById('approvalWarning').style.display = 
                currentPO.perluApproval ? 'block' : 'none';
            
            document.getElementById('btnSubmit').style.display = 
                currentPO.status === 'DRAFT' ? 'block' : 'none';
        }
        
        function hapusItem(index) {
            fetch(`/api/po/${currentPO.nomorPO}/item/${index}`, {method: 'DELETE'})
            .then(r => r.json())
            .then(data => {
                currentPO = data;
                tampilkanPO();
            });
        }
        
        function submitPO() {
            fetch(`/api/po/${currentPO.nomorPO}/submit`, {method: 'POST'})
            .then(r => r.json())
            .then(data => {
                currentPO = data;
                tampilkanPO();
            });
        }
        
        function tampilApprover() {
            document.getElementById('approverInputDiv').classList.add('show');
        }
        
        function batalkanApprover() {
            document.getElementById('approverInputDiv').classList.remove('show');
        }
        
        function approvePO() {
            const approver = document.getElementById('approverName').value;
            if (!approver) {
                alert('Masukkan nama approver!');
                return;
            }
            
            fetch(`/api/po/${currentPO.nomorPO}/approve`, {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'approver=' + encodeURIComponent(approver)
            })
            .then(r => r.json())
            .then(data => {
                currentPO = data;
                document.getElementById('approverInputDiv').classList.remove('show');
                tampilkanPO();
            });
        }
    </script>
</body>
</html>
